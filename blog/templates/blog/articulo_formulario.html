{% extends "blog/padre.html" %}

{% block contenido %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="text-primary fw-bold">✍️ Publicar nuevo Artículo</h3>
        <a href="{% url 'blog:Inicio' %}" class="btn btn-outline-secondary btn-sm">Volver al Inicio</a>
    </div>
    
    <div class="card shadow p-4" style="border-radius: 15px; border-top: 5px solid #0d6efd;">
        <form action="" method="POST" enctype="multipart/form-data"> 
            {% csrf_token %}
            
            <div class="mb-3">
                {{ mi_formulario.as_p }}
            </div>
            
            <div class="row mt-4">
                <div class="col-md-12">
                    <button type="submit" class="btn btn-primary w-100 fw-bold shadow-sm py-2">
                        🚀 Publicar en LabelBox
                    </button>
                </div>
            </div>
        </form>
    </div>
    
    <p class="text-center mt-3 text-muted small">
        Asegúrate de revisar la ortografía antes de publicar.
    </p>
</div>
{% endblock %}
