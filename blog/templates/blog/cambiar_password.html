{% extends "blog/padre.html" %}

{% block contenido %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-danger text-white">
                    <h5 class="mb-0">🛡️ Seguridad: Cambiar Contraseña</h5>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted small">Por favor, ingresá tu contraseña actual y la nueva para asegurar tu cuenta de LabelBox.</p>
                    <form action="" method="POST">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <hr>
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'blog:EditarPerfil' %}" class="btn btn-light border">Cancelar</a>
                            <button type="submit" class="btn btn-danger px-4">Confirmar Cambio</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
