{% extends "blog/padre.html" %}

{% block contenido %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0"><i class="bi bi-person-lines-fill me-2"></i> Mis Datos</h5>
        </div>
        <div class="card-body p-4">
            <form action="" method="POST">
                {% csrf_token %}
                {{ mi_formulario.as_p }}
                <button type="submit" class="btn btn-success w-100 shadow-sm">Actualizar Datos</button>
            </form>

            <div class="mt-4 pt-3 border-top">
                <p class="text-muted small mb-2"><i class="bi bi-shield-lock me-1"></i> Seguridad de la cuenta</p>
                <div class="d-grid">
                    <a href="{% url 'blog:CambiarPassword' %}" class="btn btn-outline-danger btn-sm">
                        Cambiar Contraseña
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

        <div class="col-md-4">
            <div class="card shadow-sm border-0 text-center h-100">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0">Foto de Perfil</h5>
                </div>
                <div class="card-body d-flex flex-column align-items-center justify-content-center">
                    
                    {% if url_avatar %}
                        <img src="{{ url_avatar }}" class="rounded-circle mb-3 shadow" style="width: 140px; height: 140px; object-fit: cover; border: 4px solid #f8f9fa;">
                    {% else %}
                        <div class="bg-light rounded-circle mb-3 d-flex align-items-center justify-content-center shadow-sm" style="width: 140px; height: 140px;">
                            <i class="bi bi-person-circle text-secondary" style="font-size: 5rem;"></i>
                        </div>
                    {% endif %}

                    <h6 class="fw-bold mb-1">{{ user.username }}</h6>
                    <p class="text-muted small mb-4">Miembro de LabelBox</p>

                    <a href="{% url 'blog:AgregarAvatar' %}" class="btn btn-outline-primary btn-sm w-100">
                        <i class="bi bi-camera-fill me-2"></i> Cambiar Foto
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
