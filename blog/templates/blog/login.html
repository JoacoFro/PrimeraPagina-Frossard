{% extends "blog/padre.html" %}

{% block contenido %}
<div class="container mt-5">
    <div class="card p-4 shadow-lg mx-auto" style="max-width: 400px; border-radius: 15px; border-top: 5px solid #0d6efd;">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">Acceso LabelBox</h2>
            <p class="text-muted small">Ingresá tus credenciales para continuar</p>
        </div>

        <form action="" method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                {{ form.as_p }}
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">
                🚀 Entrar al sistema
            </button>
        </form>

        <hr class="my-4">

        <div class="text-center">
            <p class="mb-1 text-muted">¿No tenés cuenta en el blog?</p>
            <a href="{% url 'blog:Registro' %}" class="fw-bold text-decoration-none">
                Crea una cuenta acá
            </a>
        </div>
        
        <div class="text-center mt-3">
            <a href="{% url 'blog:Inicio' %}" class="small text-secondary">← Volver al inicio</a>
        </div>
    </div>
</div>
{% endblock %}
