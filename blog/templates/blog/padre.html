<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Blog Django</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .main-container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
    /* Esto hace que los cuadros de texto se vean más modernos */
input, textarea, select {
    display: block;
    width: 100%;
    padding: 0.375rem 0.75rem;
    font-size: 1rem;
    color: #212529;
    background-color: #fff;
    border: 1px solid #ced4da;
    border-radius: 0.375rem;
    margin-bottom: 15px;
}
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'Inicio' %}">🚀 Mi Blog</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{% url 'AutorFormulario' %}">Cargar Autor</a>
                <a class="nav-link" href="{% url 'ArticuloFormulario' %}">Cargar Artículo</a>
                <a class="nav-link" href="{% url 'SeccionFormulario' %}">Cargar Sección</a>
                <a class="nav-link btn btn-light text-primary ms-lg-3" href="{% url 'Buscar' %}">🔍 Buscar</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 main-container">
                {% block contenido %}
                {% endblock %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
