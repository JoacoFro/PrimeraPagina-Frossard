{% extends "blog/padre.html" %}

{% block contenido %}
<div class="container mt-5 mb-5">
    <div class="card p-4 shadow-lg mx-auto" style="max-width: 550px; border-radius: 15px; border-top: 5px solid #198754;">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-success">Únete a LabelBox</h2>
            <p class="text-muted small">Crea tu cuenta para empezar a publicar y comentar</p>
        </div>

        <form action="" method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                {{ form.as_p }}
            </div>

            <button type="submit" class="btn btn-success w-100 fw-bold py-2 shadow-sm">
                ✅ Confirmar Registro
            </button>
        </form>

        <hr class="my-4">

        <div class="text-center">
            <p class="mb-1 text-muted">¿Ya tenías un usuario?</p>
            <a href="{% url 'blog:Login' %}" class="fw-bold text-decoration-none text-primary">
                Inicia sesión aquí
            </a>
        </div>

        <div class="text-center mt-3">
            <a href="{% url 'blog:Inicio' %}" class="small text-secondary">← Volver al inicio</a>
        </div>
    </div>
</div>
{% endblock %}
